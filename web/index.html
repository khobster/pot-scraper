<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>pot✱scraper — the menu</title>
<meta name="description" content="A rotating menu of dishes. Pick one and cook it in the Instant Pot or the traditional way." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<button id="toggle" class="toggle" title="Switch menu" aria-label="Switch menu">
  <svg class="pin" viewBox="0 0 32 46" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="9" y="5" width="14" height="9" rx="4.5"/>
    <path d="M12 14 11 42"/><path d="M20 14 21 42"/>
    <circle cx="16" cy="19" r="3.1"/><path d="M11 27 21 27"/>
  </svg>
</button>
<header class="masthead">
  <svg class="trees" viewBox="0 0 260 78" aria-hidden="true">
    <!-- four seasons: spring, summer, autumn, winter -->
    <g>
      <rect x="28" y="52" width="4" height="18" fill="#6b5636"/>
      <circle cx="30" cy="40" r="15" fill="#8fb36a"/><circle cx="22" cy="46" r="9" fill="#8fb36a"/><circle cx="38" cy="46" r="9" fill="#8fb36a"/>
    </g>
    <g>
      <rect x="93" y="52" width="4" height="18" fill="#6b5636"/>
      <circle cx="95" cy="38" r="17" fill="#4f7a3a"/><circle cx="85" cy="46" r="10" fill="#4f7a3a"/><circle cx="105" cy="46" r="10" fill="#4f7a3a"/>
    </g>
    <g>
      <rect x="158" y="52" width="4" height="18" fill="#6b5636"/>
      <circle cx="160" cy="40" r="15" fill="#c05a2c"/><circle cx="151" cy="46" r="9" fill="#b83c2b"/><circle cx="169" cy="46" r="9" fill="#d98c3f"/>
    </g>
    <g>
      <rect x="223" y="50" width="4" height="20" fill="#6b5636"/>
      <path d="M225 50 L225 26 M225 34 L216 27 M225 34 L234 27 M225 42 L217 36 M225 42 L233 36" stroke="#6b5636" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    </g>
  </svg>

  <h1 class="dinner">DINNER</h1>
  <div class="datebar">
    <span id="dateline" class="date"></span>
    <span class="tonight">✳ especially prepared tonight</span>
  </div>
  <input id="search" class="search" type="search" placeholder="find a dish" autocomplete="off" />
</header>

<main id="menu" class="menu"></main>
<div id="sentinel" class="sentinel"></div>
<footer class="colophon">
  <div class="rule"></div>
  <div class="fs">POT <span class="star">✱</span> SCRAPER</div>
  <p class="foot-note" id="foot-note">the menu never ends · scroll on</p>
</footer>

<div class="detail" id="detail" hidden data-lenis-prevent>
  <div class="sheet">
    <button class="close" id="close" aria-label="close">✕</button>
    <div id="detailBody"></div>
  </div>
</div>

<script src="https://unpkg.com/lenis@1.3.25/dist/lenis.min.js"></script>
<script src="app.js"></script>
</body>
</html>
